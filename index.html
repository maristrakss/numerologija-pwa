<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Numeroloģija">
  <title>Numeroloģija</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="page">
  <div class="topbar">
    <button id="installBtn" class="ghost-btn" hidden>Instalēt aplikāciju</button>
  </div>

  <div class="layout">
    <div class="panel left">
      <div class="brand">
        <h1>Numeroloģija</h1>
        <p class="intro">Elegants psihomatricas pārskats ar personiskajiem ciklu skaitļiem, iekšējo matricu, ārējo matricu un automātiskiem skaidrojumiem.</p>
      </div>

      <div class="field">
        <label for="firstName">Vārds</label>
        <input id="firstName" type="text" autocomplete="given-name" placeholder="Ievadi vārdu">
      </div>

      <div class="field">
        <label for="lastName">Uzvārds</label>
        <input id="lastName" type="text" autocomplete="family-name" placeholder="Ievadi uzvārdu">
      </div>

      <div class="field">
        <label for="fatherName">Tēva vārds (neobligāti)</label>
        <input id="fatherName" type="text" placeholder="Ja vajag ārējai matrikai">
      </div>

      <div class="field">
        <label for="birthDate">Dzimšanas datums</label>
        <input id="birthDate" type="date" autocomplete="bday">
      </div>

      <div class="field">
        <label for="analysisDate">Izpētes datums</label>
        <input id="analysisDate" type="date">
      </div>

      <div class="button-row">
        <button id="calcBtn" onclick="runCalculation()">Aprēķināt</button>
      </div>

      <div id="status" class="status"></div>
      <div class="install-tip">Telefonā šo PWA var pievienot sākuma ekrānam un lietot kā aplikāciju.</div>
    </div>

    <div class="right">
      <div id="results" class="result-wrap">
        <div class="placeholder">Ievadi datus un palaid aprēķinu.</div>
      </div>
    </div>
  </div>
</div>

<script src="./numerology.js"></script>
<script src="./app.js"></script>
</body>
</html>
